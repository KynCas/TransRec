<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrar Dashboard - TransRec</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header style="display: flex; align-items: center; gap: 12px;">
    <img src="logo.png" alt="CCSMPC Logo" style="height: 36px;">
    <h1><span class="solid-icon small icon-registrar" aria-hidden="true" style="margin-right:8px; vertical-align: middle;"></span> Registrar Dashboard</h1>
  </header>

  <main>
    <section class="panel">
      <h2>📈 System Overview</h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
        <div style="padding: 16px; background: var(--bg); border-left: 4px solid var(--primary); border-radius: 6px;">
          <small style="color: var(--text-muted);">Total Students</small>
          <p id="totalStudents" style="font-weight: 600; font-size: 1.8rem; margin: 8px 0 0 0; color: var(--primary);">-</p>
        </div>
        <div style="padding: 16px; background: var(--bg); border-left: 4px solid var(--success); border-radius: 6px;">
          <small style="color: var(--text-muted);">Completed</small>
          <p id="completedCount" style="font-weight: 600; font-size: 1.8rem; margin: 8px 0 0 0; color: var(--success);">-</p>
        </div>
        <div style="padding: 16px; background: var(--bg); border-left: 4px solid var(--warning); border-radius: 6px;">
          <small style="color: var(--text-muted);">In Progress</small>
          <p id="inProgressCount" style="font-weight: 600; font-size: 1.8rem; margin: 8px 0 0 0; color: var(--warning);">-</p>
        </div>
        <div style="padding: 16px; background: var(--bg); border-left: 4px solid var(--danger); border-radius: 6px;">
          <small style="color: var(--text-muted);">Pending Verification</small>
          <p id="pendingCount" style="font-weight: 600; font-size: 1.8rem; margin: 8px 0 0 0; color: var(--danger);">-</p>
        </div>
      </div>

      <h2 style="margin-top: 28px;">📋 All Students</h2>
      <div id="alerts" class="alerts"></div>
      
      <input type="text" id="searchBox" placeholder="Search by student name or ID..." style="margin-bottom: 16px; width: 100%; max-width: 400px;">
      
      <div style="overflow-x: auto;">
        <table id="allTable">
          <thead>
            <tr>
              <th>Student Name</th>
              <th>ID</th>
              <th style="width: 100px;">Status</th>
              <th style="width: 120px;">Progress</th>
              <th>Deadline</th>
              <th style="width: 80px;">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <a href="#" id="logout">🚪 Logout</a>
    <p style="margin-top: 12px;">Last synced: <span id="lastSync">Now</span></p>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    async function get(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`Server error: ${r.status}`);
      const text = await r.text();
      if (!text) throw new Error('Empty response from server');
      return JSON.parse(text);
    }

    async function post(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(`Server error: ${r.status}`);
      const text = await r.text();
      if (!text) throw new Error('Empty response from server');
      return JSON.parse(text);
    }

    function showAlert(message, type = 'success') {
      const el = document.createElement('div');
      el.className = 'alert' + (type === 'error' ? ' error' : type === 'warning' ? ' warning' : '');
      el.innerHTML = (type === 'success' ? '✓ ' : type === 'error' ? '✗ ' : '⚠ ') + message;
      document.getElementById('alerts').appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    function renderProgress(s) {
      const completed = s.requirements.filter(r => r.status === 'Complete' || r.status === 'Verified').length;
      const pct = s.requirements.length > 0 ? Math.round((completed / s.requirements.length) * 100) : 0;
      return pct + '%';
    }

    function getStatusLabel(pct) {
      if (pct === 100) return { label: 'Approved', color: 'var(--success)' };
      if (pct >= 50) return { label: 'In Review', color: 'var(--primary)' };
      if (pct > 0) return { label: 'For Completion', color: 'var(--accent)' };
      return { label: 'Pending', color: 'var(--warning)' };
    }

    async function load() {
      try {
        const me = await get('/api/me');
        if (me.role !== 'registrar') {
          window.location = '/login.html';
          return;
        }

        const studs = await get('/api/students');
        
        // Calculate statistics with new status labels
        let approved = 0;
        let inReview = 0;
        let forCompletion = 0;
        let pending = 0;

        studs.forEach(s => {
          const completedReqs = s.requirements.filter(r => r.status === 'Complete' || r.status === 'Verified').length;
          const total = s.requirements.length;
          const pct = total > 0 ? Math.round((completedReqs / total) * 100) : 0;
          
          if (pct === 100) approved++;
          else if (pct >= 50) inReview++;
          else if (pct > 0) forCompletion++;
          else pending++;
        });

        document.getElementById('totalStudents').textContent = studs.length;
        document.getElementById('completedCount').textContent = approved;
        document.getElementById('inProgressCount').textContent = inReview;
        document.getElementById('pendingCount').textContent = forCompletion + pending;

        // Populate table
        const tbody = document.querySelector('#allTable tbody');
        tbody.innerHTML = '';

        if (studs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 24px;">No students found</td></tr>';
          return;
        }

        studs.forEach(s => {
          const tr = document.createElement('tr');
          const pct = renderProgress(s);
          const pctNum = parseInt(pct);
          const status = getStatusLabel(pctNum);
          
          const progressColor = pctNum === 100 ? 'var(--success)' : pctNum > 50 ? 'var(--primary)' : 'var(--warning)';
          
          tr.innerHTML = `
            <td><strong>${s.name}</strong></td>
            <td>${s.student_id || 'N/A'}</td>
            <td><span style="padding:4px 8px; background:${status.color}; color:white; border-radius:4px; font-size:0.85rem; font-weight:600;">● ${status.label}</span></td>
            <td>
              <div class="progress" style="height: 20px; margin: 0;">
                <div class="progress-bar" style="width: ${pct}; background-color: ${progressColor};"></div>
                <small style="font-size: 0.75rem; right: 4px;">${pct}</small>
              </div>
            </td>
            <td>${new Date(s.deadline).toLocaleDateString()}</td>
            <td><button class="viewDetailsBtn" data-id="${s.id}" style="width: 100%; padding: 6px 8px; font-size: 0.85rem;">Details</button></td>
          `;
          tbody.appendChild(tr);
        });

        document.querySelectorAll('.viewDetailsBtn').forEach(btn => {
          btn.addEventListener('click', e => {
            const sid = e.target.dataset.id;
            const student = studs.find(s => s.id == sid);
            if (student) showDetails(student);
          });
        });

        // Setup search/filter
        const searchBox = document.getElementById('searchBox');
        if (searchBox) {
          searchBox.addEventListener('input', e => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('#allTable tbody tr').forEach(row => {
              const name = row.cells[0]?.textContent.toLowerCase() || '';
              const id = row.cells[1]?.textContent.toLowerCase() || '';
              row.style.display = name.includes(query) || id.includes(query) ? '' : 'none';
            });
          });
        }

        document.getElementById('lastSync').textContent = new Date().toLocaleTimeString();
      } catch (err) {
        console.error('Error loading data:', err);
        showAlert('Error loading student data', 'error');
      }
    }

    function showDetails(s) {
      const modal = document.createElement('div');
      modal.className = 'modal';

      const completedReqs = s.requirements.filter(r => r.status === 'Complete' || r.status === 'Verified').length;
      const pct = s.requirements.length > 0 ? Math.round((completedReqs / s.requirements.length) * 100) : 0;
      const status = getStatusLabel(pct);

      let tableRows = '';
      s.requirements.forEach(r => {
        const statusClass = r.status === 'Complete' || r.status === 'Verified' ? 'status-ok' : 'status-pending';
        const statusIcon = r.status === 'Complete' ? '✓' : r.status === 'Verified' ? '✓✓' : '⏳';
        const isVerified = r.status === 'Verified' || r.status === 'Complete';
        
        tableRows += `
          <tr>
            <td>${r.name}</td>
            <td><span class="${statusClass}">${statusIcon} ${r.status}</span></td>
            <td>${isVerified ? '-' : `<button class="statusBtn" data-rid="${r.id}" data-sid="${s.id}" style="padding: 4px 8px; font-size: 0.8rem;">Verify</button>`}</td>
          </tr>
        `;
      });

      modal.innerHTML = `
        <div class="modal-content">
          <h3>${s.name} (${s.student_id})</h3>
          <div style="margin-bottom: 16px; display:flex; gap:16px; align-items:center;">
            <div style="padding: 12px; background: var(--bg); border-radius: 6px; flex:1;">
              <p style="margin: 0; font-weight: 600;">Progress: <span style="color: var(--primary); font-size: 1.1rem;">${pct}%</span></p>
            </div>
            <div style="padding: 12px; background: ${status.color}; color:white; border-radius: 6px;">
              <p style="margin: 0; font-weight: 600;">● ${status.label}</p>
            </div>
          </div>
          <h4 style="margin-bottom: 12px;">Requirements Checklist</h4>
          <table class="req-list" style="margin-bottom: 16px;">
            <thead>
              <tr>
                <th>Requirement</th>
                <th>Status</th>
                <th style="width: 80px;">Action</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
          <button class="closeBtn">Close</button>
        </div>
      `;
      document.body.appendChild(modal);

      modal.querySelector('.closeBtn').addEventListener('click', () => modal.remove());

      modal.querySelectorAll('.statusBtn').forEach(btn => {
        btn.addEventListener('click', async e => {
          const rid = e.target.dataset.rid;
          const sid = e.target.dataset.sid;
          try {
            await post(`/api/students/${sid}/requirement/${rid}/status`, { status: 'Verified' });
            showAlert('Requirement verified successfully');
            load();
            modal.remove();
          } catch (err) {
            showAlert('Error verifying requirement', 'error');
          }
        });
      });
    }

    // Socket.io real-time updates
    const socket = io();
    socket.on('studentAdded', () => {
      showAlert('New student added');
      load();
    });
    socket.on('studentUpdated', () => {
      load();
    });
    socket.on('alert', a => showAlert(a.message, 'info'));

    document.getElementById('logout').addEventListener('click', async e => {
      e.preventDefault();
      await fetch('/api/logout', { method: 'POST' });
      window.location = '/login.html';
    });

    load();

    // Auto-refresh every 30 seconds
    setInterval(load, 30000);
  </script>
</body>
</html>
